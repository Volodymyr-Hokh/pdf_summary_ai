services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - sqlite_data:/app/data
      - upload_data:/app/uploads
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    build:
      context: .          # project root — gives access to both frontend/ and nginx/
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
  upload_data:
